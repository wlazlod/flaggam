site_name: FlagGAM
site_description: "Rule-basis generalized additive models for interpretable tabular prediction"
site_url: https://wlazlod.github.io/flaggam/
repo_url: https://github.com/wlazlod/flaggam
repo_name: wlazlod/flaggam

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guidebook: notebooks/german_credit.ipynb
  - User Guide:
    - Rules & Screening: user-guide/rules-and-screening.md
    - Extensions: user-guide/extensions.md
    - Benchmarks: user-guide/benchmarks.md
    - Visualization: user-guide/visualization.md
  - API Reference:
    - api/index.md
    - Estimators: api/estimator.md
    - Screening: api/screening.md
    - Bases: api/bases.md
    - Core: api/core.md
    - Heads: api/heads.md
    - Missing: api/missing.md
    - Weighting: api/weighting.md
    - Inspection: api/inspection.md
    - Datasets: api/datasets.md
    - Calibration: api/calibration.md
    - Monotonic: api/monotonic.md
    - Fairness: api/fairness.md
    - Plots: api/plots.md
  - Project:
    - Changelog: changelog.md
    - Decisions: DECISIONS.md
    - Licensing: LICENSING.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            docstring_section_style: spacy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: true
            show_signature_annotations: true
  - mkdocs-jupyter:
      include: ["notebooks/*.ipynb"]
      execute: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wlazlod/flaggam
